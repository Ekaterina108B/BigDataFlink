services:
  postgres:
    image: postgres:15
    container_name: lab3_postgres
    env_file: db.env
    ports:
      - "5433:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: lab3_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  producer:
    build: ./producer
    container_name: lab3_producer
    env_file: db.env
    environment:
      CSV_DIR: /csv_data
    volumes:
      - "./data:/csv_data:ro"
    depends_on:
      kafka:
        condition: service_healthy

  jobmanager:
    build: ./flink
    container_name: lab3_jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  taskmanager:
    build: ./flink
    container_name: lab3_taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    depends_on:
      - jobmanager

  flink-job:
    build: ./flink
    container_name: lab3_flink_job
    env_file: db.env
    volumes:
      - ./flink/flink_job.py:/opt/flink/usrlib/flink_job.py:ro
    entrypoint: ["/bin/bash", "-c", "echo 'Waiting for JobManager to be ready...' && sleep 30 && /opt/flink/bin/flink run --detached --jobmanager jobmanager:8081 --python /opt/flink/usrlib/flink_job.py && echo 'Flink job submitted successfully'"]
    depends_on:
      - jobmanager
      - taskmanager
      - kafka
      - postgres

volumes:
  postgres_data:
